# Persona-Gap default experiment configuration
# 2-agent Leduc Hold'em adversarial experiment

[experiment]
seed = 32
num_episodes = 5
output_dir = "outputs/test1"

# ---------- LLM Global Configuration ----------
# Secrets (api_key, api_base) are loaded from .env file at project root.
# See .env.example for available environment variables.
# Values set here override .env — leave empty or omit to use .env values.
[llm]
# api_key = ""                   # Set in .env as LLM_API_KEY (recommended)
# api_base = ""                  # Set in .env as LLM_API_BASE (recommended)
model = ""            # Default model (litellm format, e.g. "deepseek/deepseek-chat")
temperature = 0.7                # Default sampling temperature
max_tokens = 512                 # Default max output tokens
max_retries = 3                  # Retry count for failed LLM calls
# timeout = 60.0                 # Request timeout in seconds; uncomment to enable
# judge_model = "gpt-4o-mini"    # Model for LLM-as-judge; defaults to `model`
# judge_temperature = 0.0        # Judge temperature; default 0 (deterministic output)

[env]
adapter = "rlcard"
game_name = "leduc-holdem"
action_annotations_path = "configs/envs/leduc_holdem.toml"
# behavioral_method: Method for behavioral personality extraction
# Options: "annotation" (default), "scorer" (state-aware), "llm" (LLM judge)
behavioral_method = "scorer"

# ---------- Agent 0: Aggressive ----------
[[agents]]
agent_id = "agent_0"
# model = "gpt-4o"              # Uncomment to override global llm.model
# temperature = 0.9             # Uncomment to override global llm.temperature
memory_enabled = true
communication_enabled = true

[agents.personality]
risk = 0.8
aggression = 0.9
cooperation = 0.2
deception = 0.5

# ---------- Agent 1: Cooperative ----------
[[agents]]
agent_id = "agent_1"
memory_enabled = true
communication_enabled = true

[agents.personality]
risk = 0.3
aggression = 0.2
cooperation = 0.8
deception = 0.1
